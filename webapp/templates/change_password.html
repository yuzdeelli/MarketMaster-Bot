<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifre Degistir - Market Master</title>
    <link rel="stylesheet" href="/static/css/landing.css">
</head>
<body>
    <div class="hero">
        <div class="form-box">
            <h2>Sifre Degistir</h2>
            {% if error %}
            <div style="background:#ef5350;color:white;padding:10px;border-radius:6px;margin-bottom:15px;text-align:center">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div style="background:#26a69a;color:white;padding:10px;border-radius:6px;margin-bottom:15px;text-align:center">{{ success }}</div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <input type="password" name="old_password" placeholder="Mevcut Sifre" required style="width:100%;padding:10px;margin:8px 0;border:1px solid #444;border-radius:4px;background:#1e1e2e;color:#e0e0e0;font-size:14px">
                <input type="password" name="new_password" placeholder="Yeni Sifre" required style="width:100%;padding:10px;margin:8px 0;border:1px solid #444;border-radius:4px;background:#1e1e2e;color:#e0e0e0;font-size:14px">
                <input type="password" name="new_password2" placeholder="Yeni Sifre (Tekrar)" required style="width:100%;padding:10px;margin:8px 0;border:1px solid #444;border-radius:4px;background:#1e1e2e;color:#e0e0e0;font-size:14px">
                <button type="submit" style="width:100%;padding:10px;margin-top:10px;border:none;border-radius:4px;background:#26a69a;color:white;font-size:16px;cursor:pointer">Degistir</button>
            </form>
            <br>
            <a href="/dashboard" style="color:#787b86;text-decoration:none">Geri Don</a>
        </div>
    </div>
</body>
</html>
