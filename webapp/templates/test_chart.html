<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Klinecharts Test</title>
<script src="https://cdn.jsdelivr.net/npm/klinecharts@9/dist/umd/klinecharts.min.js"></script>
</head><body style="background:#1a1a2e;color:#fff;font-family:monospace;padding:20px">
<h3>Klinecharts v9 Test</h3>
<div id="info"></div>
<div id="chart" style="width:100%;height:400px;border:2px solid #f00"></div>
<script>
  const info = document.getElementById('info');
  info.textContent = 'klinecharts version: ' + (typeof klinecharts !== 'undefined' ? 'LOADED' : 'NOT LOADED');

  if (typeof klinecharts === 'undefined') {
    info.textContent += ' - Cannot continue';
  } else {
    const chart = klinecharts.init('chart');
    info.textContent += ' | chart: ' + (chart ? 'CREATED' : 'NULL');

    const data = [
      { timestamp: 1782166400000, open: 128000000, high: 129000000, low: 127000000, close: 128500000, volume: 100 },
      { timestamp: 1782252800000, open: 128500000, high: 130000000, low: 128000000, close: 129500000, volume: 200 },
      { timestamp: 1782339200000, open: 129500000, high: 131000000, low: 129000000, close: 130000000, volume: 150 },
      { timestamp: 1782425600000, open: 130000000, high: 132000000, low: 129500000, close: 131500000, volume: 300 },
      { timestamp: 1782512000000, open: 131500000, high: 133000000, low: 131000000, close: 132000000, volume: 250 },
    ];

    chart.applyNewData(data);
    info.textContent += ' | data: ' + data.length + ' points applied';

    // Try add a line
    try {
      chart.createIndicator('MA', false);
      info.textContent += ' | MA: OK';
    } catch(e) {
      info.textContent += ' | MA: ' + e.message;
    }
  }
</script>
</body></html>
