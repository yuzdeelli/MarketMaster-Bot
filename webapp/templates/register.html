<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayit - Market Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(100, 100, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .register-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
        }
        .register-logo .subtitle {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #4a90d9;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #26a69a, #00897b);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(38, 166, 154, 0.4);
        }
        .error-msg {
            background: rgba(255, 50, 50, 0.15);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-msg {
            background: rgba(50, 205, 50, 0.15);
            border: 1px solid rgba(50, 205, 50, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: #50c878;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #4a90d9;
            text-decoration: none;
            font-size: 13px;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-logo">
            <h1>Market Master</h1>
            <div class="subtitle">Yeni Hesap Olustur</div>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Kullanici Adi</label>
                <input type="text" name="username" placeholder="Kullanici adi (en az 3 karakter)" required autofocus minlength="3">
            </div>
            <div class="form-group">
                <label>Sifre</label>
                <input type="password" name="password" placeholder="Sifre (en az 4 karakter)" required minlength="4">
            </div>
            <div class="form-group">
                <label>Sifre Tekrar</label>
                <input type="password" name="password2" placeholder="Sifrenizi tekrar girin" required>
            </div>
            <button type="submit" class="btn-register">Kayit Ol</button>
        </form>

        <div class="login-link">
            Zaten hesabiniz var mi? <a href="/login">Giris Yap</a>
        </div>
    </div>
</body>
</html>
